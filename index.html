<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="script.js">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div class="form">
        <h1>Fill in Your Details Below</h1>
    
    <label for="firstname">First Name</label>
    <input type="text" id="firstName" placeholder="e.g. Zinnie"/>

    <label for="lastname">Last Name</label>
    <input type="text" id="lastName" placeholder="e.g. OnuohaOlibe"/>

    <label for="password">Password</label>
    <input type="text" id="password" placeholder="requires 8 character" required/>

    <label for="Email">Email</label>
    <input type="text" id="Email" placeholder="example@com"/>
     <button onclick="showModal()">Login</button>
    </div>

   

    <!-- modal -->

    <div id="overlay">
        <div id="modal">
            <div class="icon">
                <i class="bx bx-thumb-up"></i>

            </div>

            <p id="welcomeText">

            </p>

            <p class="message">Great To Have You Here !</p>

            <button onclick="closeModal()">Close</button>

        </div>

    </div>


<script src="script.js"></script>


</body>
</html>
